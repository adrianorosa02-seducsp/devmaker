version: '3.8'

services:
  lab01:
    image: python:3.11-slim
    command: >
      sh -c "pip install poetry gunicorn flask && 
             cd /app && 
             poetry install --no-root || true &&
             gunicorn -b 0.0.0.0:8000 main:app"
    volumes:
      - /var/inetpub/wwwroot/projetos/lab01:/app
    networks:
      - dockermaster
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=dockermaster"
        - "traefik.http.routers.lab01.rule=Host(`lab01.inetz.com.br`)"
        - "traefik.http.routers.lab01.entrypoints=web"
        - "traefik.http.services.lab01.loadbalancer.server.port=8000"

