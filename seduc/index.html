<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Centauri - Edição Definitiva</title>
    <style>
        :root {
            --neon: #00f2ff;
            --warning: #ffcc00;
            --danger: #ff0055;
            --bg: #050a10;
            --terminal-bg: rgba(0, 242, 255, 0.05);
            --scanline: rgba(18, 16, 16, 0.1);
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.95; }
            20% { opacity: 0.98; }
            45% { opacity: 0.9; }
            50% { opacity: 1; }
            55% { opacity: 0.9; }
            100% { opacity: 0.97; }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #hud {
            width: 95%;
            max-width: 800px;
            border: 2px solid var(--neon);
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            border-radius: 10px;
            background: rgba(5, 10, 16, 0.98);
            position: relative;
            z-index: 1;
            animation: flicker 0.15s infinite;
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--neon);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .stats-val { color: var(--neon); font-weight: bold; }
        .sector-val { color: var(--warning); font-weight: bold; }

        .progress-bar-bg { background: #111; height: 6px; width: 100%; margin-bottom: 20px; border-radius: 3px; }
        #progress-fill { background: var(--neon); height: 100%; width: 0%; transition: width 0.4s; }

        #display-area {
            min-height: 200px;
            padding: 20px;
            background: var(--terminal-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            margin-bottom: 20px;
        }

        h2 { color: var(--neon); text-transform: uppercase; margin-top: 0; }

        .theory-section {
            display: none;
            background: #121820;
            border-left: 4px solid var(--warning);
            padding: 15px;
            margin: 15px 0;
            color: var(--warning);
            font-size: 0.9em;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            background: transparent;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        button.btn-theory { border-color: var(--warning); color: var(--warning); }
        .highlight { color: #fff; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div id="hud">
    <div class="header">
        <span>SISTEMA: <span id="hp-val" class="stats-val">100</span>%</span>
        <span>RECURSOS: <span id="gold-val" class="stats-val">5000</span></span>
        <span>FASE: <span id="lvl-txt" class="stats-val">0/20</span></span>
        <span>PATENTE: <span id="rank-val" class="stats-val">CADETE</span></span>
        <span>SETOR: <span id="sector-val" class="sector-val">INICIALIZANDO...</span></span>
    </div>
    <div class="progress-bar-bg"><div id="progress-fill"></div></div>

    <div id="display-area">
        <h2 id="title">TERMINAL DE COMANDO</h2>
        <p id="desc">Aguardando inicialização do protocolo centauri...</p>
    </div>

    <div id="theory-box" class="theory-section">
        <strong>[DATABASE TÉCNICA]</strong><br><br>
        <span id="theory-content"></span>
    </div>

    <div id="controls" class="btn-group">
        <button onclick="startGame()">INICIAR MISSÃO</button>
    </div>
</div>

<script>
    let hp = 100, gold = 5000, currentIdx = 0;

    const sectors = [
        { start: 0, end: 2, name: "ESTAÇÃO BICUDO (RISCO)" },
        { start: 3, end: 5, name: "ESTAÇÃO AMILCARE (RISCO)" },
        { start: 6, end: 10, name: "BASE REGINATO (RISCO)" },
        { start: 11, end: 13, name: "BASE REGINATO (IA)" },
        { start: 14, end: 16, name: "ESTAÇÃO AMILCARE (FRONT/BACK)" },
        { start: 17, end: 19, name: "ESTAÇÃO BICUDO (GIT/MSG)" }
    ];

    const missions = [
        {
            title: "01: VARREDURA SWOT",
            desc: "Uma tempestade solar ameaça os servidores locais de Bicudo. Como classificamos?",
            theory: "Na SWOT, ameaças são fatores externos negativos.",
            options: [
                { text: "Fraqueza (Interno)", correct: false, hp: -10, gold: 0, feedback: "ERRO. Fraquezas são internas." },
                { text: "Ameaça (Externo)", correct: true, hp: 0, gold: 0, feedback: "CORRETO. Escudos ativados." }
            ]
        },
        {
            title: "02: MATRIZ DE RISCOS",
            desc: "Falha de oxigênio: Chance BAIXA, mas Impacto FATAL. Qual a prioridade?",
            theory: "Impacto Crítico exige prioridade total.",
            options: [
                { text: "Ignorar (Baixa Chance)", correct: false, hp: -30, gold: 0, feedback: "FALHA. O sistema colapsou." },
                { text: "Priorizar Mitigação", correct: true, hp: 0, gold: -600, feedback: "CERTO. Vida preservada." }
            ]
        },
        {
            title: "03: TRANSFERÊNCIA",
            desc: "O reator nuclear precisa de manutenção avançada fora das suas habilidades.",
            theory: "A TRANSFERÊNCIA passa o risco para especialistas externos.",
            options: [
                { text: "Tentar sozinho", correct: false, hp: -40, gold: 0, feedback: "EXPLOSÃO. Falta técnica." },
                { text: "Contratar Especialistas", correct: true, hp: 0, gold: -1000, feedback: "CORRETO. Risco transferido." }
            ]
        },
        {
            title: "04: MONSTRO DO ESCOPO",
            desc: "Em Amilcare, o comando pede novas salas sem dar mais tempo ou créditos.",
            theory: "O Risco de Escopo desequilibrado gera falhas.",
            options: [
                { text: "Aceitar Imediatamente", correct: false, hp: -25, gold: 0, feedback: "BURN-OUT. A equipe faliu." },
                { text: "Negociar Prazo/Verba", correct: true, hp: 0, gold: 500, feedback: "SÁBIO. Equilíbrio mantido." }
            ]
        },
        {
            title: "05: MITIGAÇÃO",
            desc: "Poeira marciana travando robôs de mineração perto de Amilcare.",
            theory: "A MITIGAÇÃO visa reduzir o impacto ou a chance.",
            options: [
                { text: "Instalar Filtros", correct: true, hp: -5, gold: -600, feedback: "CERTO. Desgaste reduzido." },
                { text: "Substituir Diariamente", correct: false, hp: 0, gold: -3000, feedback: "FALÊNCIA. Custo alto." }
            ]
        },
        {
            title: "06: ACEITAÇÃO",
            desc: "Pequeno barulho estético na nave em Amilcare. Conserto caríssimo.",
            theory: "A ACEITAÇÃO é para riscos de baixo impacto e alto custo de resposta.",
            options: [
                { text: "Consertar Tudo", correct: false, hp: 0, gold: -2000, feedback: "DESPERDÍCIO. Ouro gasto à toa." },
                { text: "Aceitar e Monitorar", correct: true, hp: -2, gold: 0, feedback: "PRAGMÁTICO. Ouro preservado." }
            ]
        },
        {
            title: "07: RISCO POSITIVO",
            desc: "Em Reginato, satélite abandonado pode ser hackeado para melhorar o sinal.",
            theory: "Riscos positivos são OPORTUNIDADES.",
            options: [
                { text: "Ignorar (Medo)", correct: false, hp: 0, gold: 0, feedback: "ESTAGNAÇÃO. Perdeu a vantagem." },
                { text: "Explorar Satélite", correct: true, hp: -5, gold: 2000, feedback: "SUCESSO! Bônus de recursos." }
            ]
        },
        {
            title: "08: FRAQUEZAS",
            desc: "Equipe de Reginato não sabe documentar o código.",
            theory: "Fatores internos negativos são FRAQUEZAS.",
            options: [
                { text: "Treinar Equipe", correct: true, hp: 0, gold: -800, feedback: "EXCELENTE. Virou força." },
                { text: "Ignorar", correct: false, hp: -30, gold: 0, feedback: "CAOS. Progresso perdido." }
            ]
        },
        {
            title: "09: CONTINGÊNCIA",
            desc: "O reator explodiu AGORA! O risco virou realidade.",
            theory: "Plano de Contingência é o Plano B ativado no momento do desastre.",
            options: [
                { text: "Ativar Reservas", correct: true, hp: -10, gold: -400, feedback: "SALVOS. O Plano B funcionou." },
                { text: "Apagar Fogo Manual", correct: false, hp: -70, gold: 0, feedback: "TARDE DEMAIS. Fim do sistema." }
            ]
        },
        {
            title: "10: ENTREGA FINAL",
            desc: "Como garantir a aprovação do projeto em Reginato?",
            theory: "A documentação técnica valida o sucesso.",
            options: [
                { text: "Entregar sem registro", correct: false, hp: -100, gold: 0, feedback: "REPROVADO. Sem evidências." },
                { text: "Relatório de Riscos", correct: true, hp: 0, gold: 0, feedback: "VITÓRIA! Diploma Centauri obtido." }
            ]
        },
        {
            title: "11: TREINAMENTO NEURAL",
            desc: "A IA de Reginato está errando a rota da nave. Os dados estão viciados.",
            theory: "O OVERFITTING ocorre quando o modelo decora os dados mas não generaliza.",
            options: [
                { text: "Aumentar Épocas", correct: false, hp: -10, gold: -500, feedback: "ERRO. O modelo ficou mais viciado." },
                { text: "Regularizar/Limpar Dados", correct: true, hp: 0, gold: -300, feedback: "CORRETO. Precisão restaurada." }
            ]
        },
        {
            title: "12: RECONHECIMENTO",
            desc: "Identificar naves inimigas camufladas no radar de Reginato.",
            theory: "Redes CONVOLUCIONAIS (CNN) são ideais para processamento de imagens.",
            options: [
                { text: "Rede MLP Simples", correct: false, hp: -20, gold: 0, feedback: "FALHA. Muita perda de detalhe espacial." },
                { text: "Implementar CNN", correct: true, hp: 0, gold: -800, feedback: "SUCESSO. Inimigos detectados." }
            ]
        },
        {
            title: "13: ÉTICA SINTÉTICA",
            desc: "A IA deve decidir entre salvar a carga ou a tripulação em caso de colisão.",
            theory: "O viés algorítmico e a ÉTICA EM IA devem priorizar a vida humana.",
            options: [
                { text: "Priorizar Carga (Lucro)", correct: false, hp: -50, gold: 5000, feedback: "DESASTRE. Motim na tripulação." },
                { text: "Priorizar Tripulação", correct: true, hp: 0, gold: -2000, feedback: "HUMANO. Você seguiu as leis da robótica." }
            ]
        },
        {
            title: "14: API GATEWAY",
            desc: "O sistema de Amilcare está lento devido a milhares de requisições desordenadas.",
            theory: "O REST API com Cache e Rate Limit protege o servidor de sobrecarga.",
            options: [
                { text: "Servidor mais potente", correct: false, hp: 0, gold: -4000, feedback: "CARO. O problema de ordem continua." },
                { text: "Implementar Rate Limit", correct: true, hp: 0, gold: -500, feedback: "EFICIENTE. Fluxo normalizado." }
            ]
        },
        {
            title: "15: INTERFACE REATIVA",
            desc: "Os astronautas em Amilcare não conseguem ler o painel em tablets pequenos.",
            theory: "O DESIGN RESPONSIVO garante usabilidade em qualquer tamanho de tela.",
            options: [
                { text: "Fixar largura em 1920px", correct: false, hp: -10, gold: 0, feedback: "INÚTIL. A barra de rolagem é gigante." },
                { text: "Usar Flexbox/Grid", correct: true, hp: 0, gold: -300, feedback: "PERFEITO. Visível em todos os módulos." }
            ]
        },
        {
            title: "16: PERSISTÊNCIA NO SQL",
            desc: "O banco de dados de Amilcare corrompeu após uma queda de energia.",
            theory: "A propriedade ACID garante que transações sejam seguras e permanentes.",
            options: [
                { text: "Salvar em arquivos .txt", correct: false, hp: -30, gold: 0, feedback: "CAOS. Dados inconsistentes." },
                { text: "Ativar LOG de Transações", correct: true, hp: 0, gold: -400, feedback: "SEGURO. Dados recuperados." }
            ]
        },
        {
            title: "17: CONFLITO DE BRANCH",
            desc: "Dois engenheiros em Bicudo alteraram o mesmo arquivo do motor.",
            theory: "O MERGE CONFLICT exige intervenção manual para decidir o código final.",
            options: [
                { text: "Deletar o repositório", correct: false, hp: -50, gold: 0, feedback: "PÂNICO. Todo o histórico foi perdido." },
                { text: "Resolver manualmente", correct: true, hp: 0, gold: 0, feedback: "CORRETO. Versão estável criada." }
            ]
        },
        {
            title: "18: REVERSÃO DE EMERGÊNCIA",
            desc: "A última atualização causou um bug crítico nos propulsores de Bicudo.",
            theory: "O comando GIT REVERT desfaz alterações mantendo o histórico.",
            options: [
                { text: "Reescrever tudo do zero", correct: false, hp: -20, gold: -1000, feedback: "LENTO. A nave já colidiu." },
                { text: "Git Revert [Hash]", correct: true, hp: 0, gold: 0, feedback: "RÁPIDO. Sistema restaurado." }
            ]
        },
        {
            title: "19: MENSAGERIA ASSÍNCRONA",
            desc: "Milhares de sensores enviam dados ao mesmo tempo para a CPU de Bicudo.",
            theory: "Filas de MENSAGERIA (RabbitMQ/Kafka) desacoplam sistemas e evitam gargalos.",
            options: [
                { text: "Conexão Direta (Síncrona)", correct: false, hp: -40, gold: 0, feedback: "TRAVOU. A CPU não aguentou o pico." },
                { text: "Usar Fila de Mensagens", correct: true, hp: 0, gold: -700, feedback: "FLUIDO. Dados processados em ordem." }
            ]
        },
        {
            title: "20: O LANÇAMENTO FINAL",
            desc: "O Protocolo Centauri está pronto para o deploy final em Bicudo.",
            theory: "O CI/CD automatiza testes e entregas contínuas com segurança.",
            options: [
                { text: "Deploy Manual na Sexta", correct: false, hp: -100, gold: 0, feedback: "REPROVADO. O sistema quebrou no deploy." },
                { text: "Ativar Pipeline CI/CD", correct: true, hp: 0, gold: 0, feedback: "VITÓRIA! Missão Centauri concluída com Sucesso Total!" }
            ]
        }
    ];

    function getSector(idx) {
        const s = sectors.find(s => idx >= s.start && idx <= s.end);
        return s ? s.name : "SETOR FINAL";
    }

    function getRank(idx, hp, gold) {
        if (idx >= 19 && hp > 50 && gold > 4000) return "ARQUITETO MASTER";
        if (idx >= 15) return "DESENVOLVEDOR SENIOR";
        if (idx >= 10) return "DESENVOLVEDOR PLENO";
        if (idx >= 5) return "DESENVOLVEDOR JUNIOR";
        return "CADETE";
    }

    function updateHUD() {
        document.getElementById('hp-val').innerText = hp;
        document.getElementById('gold-val').innerText = gold;
        document.getElementById('lvl-txt').innerText = `${currentIdx + 1}/20`;
        document.getElementById('sector-val').innerText = getSector(currentIdx);
        document.getElementById('rank-val').innerText = getRank(currentIdx, hp, gold);
        document.getElementById('progress-fill').style.width = `${(currentIdx + 1) * 5}%`;
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('centauri_save', JSON.stringify({ hp, gold, currentIdx }));
    }

    function checkSave() {
        const save = localStorage.getItem('centauri_save');
        if (save) {
            const controls = document.getElementById('controls');
            controls.innerHTML = `
                <button onclick="startGame()">NOVA MISSÃO</button>
                <button onclick="continueGame()">CONTINUAR</button>
            `;
        }
    }

    function continueGame() {
        const saveStr = localStorage.getItem('centauri_save');
        if (saveStr) {
            const save = JSON.parse(saveStr);
            hp = save.hp;
            gold = save.gold;
            currentIdx = save.currentIdx;
            loadLevel(currentIdx);
        }
    }

    function typeWriter(elementId, text, speed = 20, callback = null) {
        const element = document.getElementById(elementId);
        element.innerHTML = "";
        let i = 0;
        
        // Disable controls during typing
        const controls = document.getElementById('controls');
        const buttons = controls.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                if (callback) callback();
            }
        }
        type();
    }

    function startGame() {
        hp = 100; gold = 5000; currentIdx = 0;
        loadLevel(0);
    }

    function loadLevel(idx) {
        currentIdx = idx;
        const m = missions[idx];
        document.getElementById('theory-box').style.display = 'none';
        document.getElementById('title').innerText = m.title;
        
        const controls = document.getElementById('controls');
        controls.innerHTML = `
            <button class="btn-theory" onclick="openTheory(${idx})" disabled>MANUAL TÉCNICO</button>
            <button id="opt0" onclick="makeChoice(${idx}, 0)" disabled>${m.options[0].text}</button>
            <button id="opt1" onclick="makeChoice(${idx}, 1)" disabled>${m.options[1].text}</button>
        `;

        typeWriter('desc', m.desc, 20, () => {
            document.querySelector('.btn-theory').disabled = false;
        });
        
        updateHUD();
    }

    function openTheory(idx) {
        document.getElementById('theory-content').innerHTML = missions[idx].theory;
        document.getElementById('theory-box').style.display = 'block';
        document.getElementById('opt0').disabled = false;
        document.getElementById('opt1').disabled = false;
    }

    function makeChoice(mIdx, oIdx) {
        const choice = missions[mIdx].options[oIdx];
        hp += choice.hp;
        gold += choice.gold;
        updateHUD();

        const displayArea = document.getElementById('display-area');
        displayArea.innerHTML = `
            <h2 id="result-title" style="color: ${choice.correct ? 'var(--neon)' : 'var(--danger)'}">
                ${choice.correct ? '[ SUCESSO ]' : '[ FALHA ]'}
            </h2>
            <p id="feedback-text"></p>
        `;

        const controls = document.getElementById('controls');
        controls.innerHTML = ""; // Clear to prevent multiple clicks

        typeWriter('feedback-text', choice.feedback, 20, () => {
            if (hp <= 0) {
                displayArea.innerHTML += `<h2>FIM DA MISSÃO.</h2>`;
                controls.innerHTML = `<button onclick="startGame()">REINICIAR</button>`;
                localStorage.removeItem('centauri_save');
            } else if (mIdx + 1 < missions.length) {
                controls.innerHTML = `<button onclick="loadLevel(${mIdx + 1})">AVANÇAR PARA FASE ${mIdx + 2}</button>`;
            } else {
                displayArea.innerHTML += `<h2>VITÓRIA TOTAL!</h2><p>Você dominou o ciclo completo de desenvolvimento.</p>`;
                controls.innerHTML = `<button onclick="startGame()">JOGAR NOVAMENTE</button>`;
                localStorage.removeItem('centauri_save');
            }
        });
    }

    window.onload = checkSave;
</script>
</body>
</html>
