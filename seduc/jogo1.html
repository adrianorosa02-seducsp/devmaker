<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Centauri</title>

<style>
:root{
    --neon:#00f2ff;
    --warning:#ffcc00;
    --danger:#ff0055;
    --bg:#050a10;
}

body{
    background:var(--bg);
    color:#e0e0e0;
    font-family:'Courier New', monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

#hud{
    width:95%;
    max-width:850px;
    border:2px solid var(--neon);
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,242,255,.2);
}

.header{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid var(--neon);
    padding-bottom:10px;
    margin-bottom:20px;
}

.progress-bar-bg{
    background:#111;
    height:8px;
    margin-bottom:20px;
}

#progress-fill{
    background:var(--neon);
    height:100%;
    width:0%;
    transition:.4s;
}

#display-area{
    min-height:180px;
    padding:20px;
    background:rgba(0,242,255,.05);
    margin-bottom:20px;
}

.theory-section{
    display:none;
    background:#121820;
    border-left:4px solid var(--warning);
    padding:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:transparent;
    color:var(--neon);
    border:1px solid var(--neon);
    cursor:pointer;
    font-weight:bold;
}

button:hover:not(:disabled){
    background:var(--neon);
    color:black;
}

button:disabled{
    opacity:.4;
}

.btn-theory{
    color:var(--warning);
    border-color:var(--warning);
}
</style>
</head>
<body>

<div id="hud">

<div class="header">
    <span>HP: <span id="hp-val">100</span>%</span>
    <span>RECURSOS: <span id="gold-val">5000</span></span>
    <span>FASE: <span id="lvl-txt">1/10</span></span>
</div>

<div class="progress-bar-bg">
    <div id="progress-fill"></div>
</div>

<div id="display-area">
    <h2>TERMINAL DE COMANDO</h2>
    <p>Aguardando inicialização...</p>
</div>

<div id="theory-box" class="theory-section">
    <span id="theory-content"></span>
</div>

<div id="controls">
    <button onclick="startGame()">INICIAR MISSÃO</button>
</div>

</div>

<script>

let hp = 100;
let gold = 5000;
let currentIdx = 0;

const missions = [
{
title:"01: SWOT",
desc:"Tempestade solar ameaça servidores.",
theory:"Ameaça = fator externo negativo.",
options:[
{text:"Fraqueza",correct:false,hp:-10,gold:0,feedback:"Erro."},
{text:"Ameaça",correct:true,hp:0,gold:0,feedback:"Correto."}
]
},
{
title:"02: Probabilidade",
desc:"Oxigênio: chance baixa, impacto fatal.",
theory:"Impacto fatal = prioridade alta.",
options:[
{text:"Ignorar",correct:false,hp:-30,gold:0,feedback:"Falha."},
{text:"Mitigar",correct:true,hp:0,gold:-500,feedback:"Correto."}
]
},
{
title:"03: Transferência",
desc:"Reator exige especialista.",
theory:"Transferir risco = terceirizar.",
options:[
{text:"Consertar",correct:false,hp:-40,gold:0,feedback:"Explosão."},
{text:"Contratar",correct:true,hp:0,gold:-800,feedback:"Correto."}
]
},
{
title:"04: Escopo",
desc:"Mais entregas sem prazo extra.",
theory:"Negociar recursos.",
options:[
{text:"Aceitar",correct:false,hp:-20,gold:0,feedback:"Sobrecarga."},
{text:"Negociar",correct:true,hp:0,gold:300,feedback:"Correto."}
]
},
{
title:"05: Mitigação",
desc:"Poeira marciana nos robôs.",
theory:"Mitigar reduz impacto.",
options:[
{text:"Filtros",correct:true,hp:-5,gold:-500,feedback:"Correto."},
{text:"Trocar robôs",correct:false,hp:0,gold:-3000,feedback:"Muito caro."}
]
},
{
title:"06: Aceitação",
desc:"Ruído estético sem impacto.",
theory:"Aceitar risco pequeno.",
options:[
{text:"Consertar tudo",correct:false,hp:0,gold:-2000,feedback:"Desperdício."},
{text:"Monitorar",correct:true,hp:-2,gold:0,feedback:"Correto."}
]
},
{
title:"07: Oportunidade",
desc:"Satélite abandonado pode ajudar.",
theory:"Risco positivo = oportunidade.",
options:[
{text:"Ignorar",correct:false,hp:0,gold:0,feedback:"Perdeu chance."},
{text:"Explorar",correct:true,hp:-5,gold:1500,feedback:"Excelente."}
]
},
{
title:"08: Fraqueza interna",
desc:"Equipe não documenta código.",
theory:"Fraqueza = fator interno.",
options:[
{text:"Treinar",correct:true,hp:0,gold:-700,feedback:"Correto."},
{text:"Ignorar",correct:false,hp:-25,gold:0,feedback:"Caos."}
]
},
{
title:"09: Contingência",
desc:"Reator explodiu.",
theory:"Plano B imediato.",
options:[
{text:"Gerador reserva",correct:true,hp:-10,gold:-400,feedback:"Salvo."},
{text:"Improvisar",correct:false,hp:-70,gold:0,feedback:"Tarde demais."}
]
},
{
title:"10: Encerramento",
desc:"Entrega final do projeto.",
theory:"Documentação valida resultado.",
options:[
{text:"Sem relatório",correct:false,hp:-100,gold:0,feedback:"Reprovado."},
{text:"Relatório final",correct:true,hp:0,gold:0,feedback:"Vitória!"}
]
}
];

function updateHUD(){
    hp = Math.max(0,hp);

    document.getElementById("hp-val").textContent = hp;
    document.getElementById("gold-val").textContent = gold;
    document.getElementById("lvl-txt").textContent = `${currentIdx+1}/${missions.length}`;
    document.getElementById("progress-fill").style.width =
        ((currentIdx+1)/missions.length*100)+"%";
}

function startGame(){
    hp=100;
    gold=5000;
    currentIdx=0;
    renderMission();
}

function renderMission(){

    if(currentIdx>=missions.length){
        victory();
        return;
    }

    const m = missions[currentIdx];

    document.getElementById("display-area").innerHTML=`
        <h2>${m.title}</h2>
        <p>${m.desc}</p>
    `;

    document.getElementById("theory-box").style.display="none";

    document.getElementById("controls").innerHTML=`
        <button class="btn-theory" onclick="openTheory()">MANUAL TÉCNICO</button>
        <button id="opt0" onclick="choose(0)" disabled>${m.options[0].text}</button>
        <button id="opt1" onclick="choose(1)" disabled>${m.options[1].text}</button>
    `;

    updateHUD();
}

function openTheory(){
    const m = missions[currentIdx];

    document.getElementById("theory-content").innerHTML = m.theory;
    document.getElementById("theory-box").style.display="block";

    document.getElementById("opt0").disabled=false;
    document.getElementById("opt1").disabled=false;
}

function choose(optionIndex){

    const choice = missions[currentIdx].options[optionIndex];

    hp += choice.hp;
    gold += choice.gold;

    updateHUD();

    document.getElementById("display-area").innerHTML=`
        <h2>${choice.correct ? "SUCESSO" : "FALHA"}</h2>
        <p>${choice.feedback}</p>
    `;

    if(hp<=0){
        gameOver();
        return;
    }

    document.getElementById("controls").innerHTML=`
        <button onclick="advance()">AVANÇAR</button>
    `;
}

function advance(){
    currentIdx++;
    renderMission();
}

function gameOver(){
    document.getElementById("display-area").innerHTML=`
        <h2>MISSÃO ENCERRADA</h2>
        <p>Sistema comprometido.</p>
    `;

    document.getElementById("controls").innerHTML=`
        <button onclick="startGame()">REINICIAR</button>
    `;
}

function victory(){
    document.getElementById("display-area").innerHTML=`
        <h2>VITÓRIA TOTAL 🚀</h2>
        <p>Você dominou gestão de riscos.</p>
    `;

    document.getElementById("controls").innerHTML=`
        <button onclick="startGame()">JOGAR NOVAMENTE</button>
    `;
}

</script>

</body>
</html>
