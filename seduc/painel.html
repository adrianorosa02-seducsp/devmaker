<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Disciplinas - Adriano Rosa</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; }
        .container { max-width: 800px; width: 100%; text-align: center; }
        h1 { margin-bottom: 30px; color: var(--primary); }
        .step-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .instruction { font-size: 0.9em; color: #94a3b8; margin-bottom: 10px; }
        
        /* Grid de Disciplinas */
        .grid-disciplinas { display: grid; grid-template-columns: repeat(2, 1-fr); gap: 15px; margin: 30px 0; }
        .btn-disciplina { background: #334155; border: none; padding: 20px; color: white; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .btn-disciplina:hover { background: var(--secondary); transform: translateY(-3px); }

        /* Botões de Ação */
        .btn-copy { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; padding: 15px 30px; 
                    color: white; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.1em; }
        .btn-copy:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Configurar Ambiente de Trabalho</h1>

        <div class="step-box">
            <p class="instruction">1. Clique abaixo, abra o <strong>PowerShell</strong> e cole:</p>
            <button class="btn-copy" onclick="copyToClipboard('iex (iwr -UseBasicParsing  https://github.com/adrianorosa02-seducsp/devmaker/blame/main/seduc/config_ambiente_python.ps1)')">
                AJUSTAR PATH (Python, Pip, GH)
            </button>
        </div>

        <hr style="border: 0.5px solid #334155; margin: 40px 0;">

        <h2>Disciplinas Ministradas</h2>
        <div class="grid-disciplinas">
            <button class="btn-disciplina">Sistemas Operacionais</button>
            <button class="btn-disciplina">Desenvolvimento Web</button>
            <button class="btn-disciplina">Automação e Integração</button>
            <button class="btn-disciplina">Banco de Dados</button>
        </div>

        <div class="step-box">
            <p class="instruction">2. Clique abaixo, abra o <strong>Git Bash</strong> e cole:</p>
            <button class="btn-copy" style="background: #22c55e;" onclick="copyToClipboard('curl -sL  https://lab.inetz.com.br/devmaker/ava/seduc/setup_repo7.sh | bash')">
                TROQUEI DE MÁQUINA OU NOVO PROJETO
            </button>
        </div>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Comando copiado! Agora cole no seu terminal.");
            });
        }
    </script>
</body>
</html>
