<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROTOCOLO CENTAURI AAA</title>

<style>

:root{
 --neon:#00f2ff;
 --warning:#ffcc00;
 --danger:#ff0044;
 --bg:#02040a;
}

*{
 box-sizing:border-box;
 margin:0;
 padding:0;
}

body{
 min-height:100vh;
 font-family:'Courier New', monospace;
 display:flex;
 justify-content:center;
 align-items:center;
 background-size:cover;
 background-position:center;
 background-repeat:no-repeat;
 background-attachment:fixed;
 transition:background-image 1s ease-in-out;
 overflow:hidden;
}

body::before{
 content:'';
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.45);
 z-index:-1;
}

#game{
 width:95%;
 max-width:1300px;
 min-height:88vh;

 background:rgba(0,0,0,.72);
 backdrop-filter: blur(7px);

 border:2px solid var(--neon);
 border-radius:18px;

 box-shadow:0 0 45px rgba(0,242,255,.22);

 padding:25px;

 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

.header{
 display:flex;
 justify-content:space-between;
 gap:20px;
 flex-wrap:wrap;
 border-bottom:1px solid rgba(0,242,255,.3);
 padding-bottom:12px;
 margin-bottom:20px;
 color:var(--neon);
 font-weight:bold;
}

.progress-bg{
 height:8px;
 background:#111;
 border-radius:8px;
 overflow:hidden;
 margin-bottom:20px;
}

#progress{
 height:100%;
 width:0%;
 background:linear-gradient(90deg,#00f2ff,#00ffaa);
 transition:.5s;
}

#display{
 flex:1;
 min-height:320px;
 padding:25px;
 background:rgba(0,242,255,.05);
 border:1px solid rgba(0,242,255,.15);
 border-radius:12px;
 line-height:1.7;
 font-size:20px;
 white-space:pre-line;
 overflow:auto;
}

#controls{
 margin-top:20px;
}

button{
 width:100%;
 margin-top:12px;
 padding:16px;
 background:rgba(0,0,0,.35);
 border:1px solid var(--neon);
 color:var(--neon);
 cursor:pointer;
 font-weight:bold;
 font-size:17px;
 border-radius:10px;
 transition:.25s;
}

button:hover{
 background:var(--neon);
 color:black;
 transform:scale(1.01);
}

.manual{
 border-color:var(--warning);
 color:var(--warning);
}

.alert{
 animation:pulse .8s infinite;
}

@keyframes pulse{
 0%{box-shadow:0 0 20px rgba(255,0,68,.2);}
 50%{box-shadow:0 0 35px rgba(255,0,68,.7);}
 100%{box-shadow:0 0 20px rgba(255,0,68,.2);}
}

@media(max-width:900px){

#game{
 width:98%;
 min-height:96vh;
 padding:15px;
}

#display{
 font-size:16px;
 min-height:240px;
 padding:15px;
}

button{
 font-size:14px;
 padding:12px;
}

.header{
 font-size:14px;
}

}

</style>
</head>
<body>

<div id="game">

<div class="header">
<div>HP: <span id="hp">100</span>%</div>
<div>RECURSOS: <span id="gold">5000</span></div>
<div>FASE: <span id="fase">1/30</span></div>
</div>

<div class="progress-bg">
<div id="progress"></div>
</div>

<div id="display"></div>

<div id="controls"></div>

</div>

<script>

let hp=100;
let gold=5000;
let fase=0;

let score={
documentacao:0,
tempo:0,
sustentabilidade:0,
qualidade:0,
colaboracao:0
};

const backgrounds=[
'img/fase1.jpg',
'img/fase2.jpg',
'img/fase3.jpg',
'img/fase4.jpg',
'img/fase5.jpg'
];

const baseMissions=[

{
title:"O DESPERTAR DA ESTAÇÃO",
desc:"Às 03:14 UTC a estação desperta sem comando humano. Alarmes silenciosos percorrem corredores vazios enquanto monitores acendem sozinhos.",
theory:"DOCUMENTAÇÃO E RASTREABILIDADE\n• verificar registros\n• validar alterações\n• identificar responsáveis",
axis:"documentacao",
ok:"Consultar registros técnicos antes de agir",
bad:"Desligar imediatamente o setor",
feedbackOk:"Registros antigos revelam uma ativação programada há 12 anos.",
feedbackBad:"A energia principal entra em conflito."
},

{
title:"TEMPESTADE DE PLASMA",
desc:"Uma onda solar atravessa o setor orbital e ameaça os núcleos de armazenamento.",
theory:"GESTÃO DE RISCO\n• proteger ativos críticos\n• antecipar impacto",
axis:"tempo",
ok:"Redirecionar energia para proteção",
bad:"Esperar a tempestade passar",
feedbackOk:"Blindagem ativa salva os bancos centrais.",
feedbackBad:"Setores perdem memória operacional."
},

{
title:"ENGENHEIRO DESAPARECIDO",
desc:"O engenheiro principal desaparece no setor técnico durante um apagão parcial.",
theory:"GESTÃO DE EQUIPE\n• coordenação\n• comunicação",
axis:"colaboracao",
ok:"Montar busca coordenada",
bad:"Cada setor agir isoladamente",
feedbackOk:"A equipe mantém rastreio e estabilidade.",
feedbackBad:"A estação perde sincronia."
},

{
title:"SETOR OCULTO",
desc:"Um setor inexistente no mapa consome energia e responde ao sistema.",
theory:"ANÁLISE DE ESCOPO\n• comparar projeto com realidade",
axis:"qualidade",
ok:"Investigar origem do setor",
bad:"Ignorar anomalia",
feedbackOk:"O setor oculto contém protocolos esquecidos.",
feedbackBad:"A anomalia se expande."
},

{
title:"FALHA DE OXIGÊNIO",
desc:"A pressão cai apenas no setor administrativo sem explicação aparente.",
theory:"CAUSA RAIZ\n• agir no foco",
axis:"sustentabilidade",
ok:"Isolar origem do vazamento",
bad:"Abrir todas as válvulas",
feedbackOk:"Fluxo estabilizado.",
feedbackBad:"Consumo crítico detectado."
}

];

const missions=[];

for(let i=0;i<30;i++){

 let b=baseMissions[i%5];

 missions.push({
  title:`FASE ${i+1} — ${b.title}`,
  desc:b.desc,
  theory:b.theory,
  axis:b.axis,
  ok:b.ok,
  bad:b.bad,
  feedbackOk:b.feedbackOk,
  feedbackBad:b.feedbackBad
 });

}

function typeText(text){

 let display=document.getElementById("display");
 display.innerHTML='';

 let i=0;

 let interval=setInterval(()=>{

  display.innerHTML += text[i];
  i++;

  if(i>=text.length) clearInterval(interval);

 },15);

}

function updateHUD(){

 document.getElementById("hp").textContent=hp;
 document.getElementById("gold").textContent=gold;
 document.getElementById("fase").textContent=`${fase+1}/30`;
 document.getElementById("progress").style.width=((fase+1)/30*100)+"%";

 if(hp<40){
  document.getElementById("game").classList.add("alert");
 }else{
  document.getElementById("game").classList.remove("alert");
 }

}

function render(){

 if(fase>=30){
  finalScreen();
  return;
 }

 let m=missions[fase];

 document.body.style.backgroundImage=`url(${backgrounds[fase%backgrounds.length]})`;

 typeText(
`>>> ${m.title}

${m.desc}

IA CENTAURI:
"Escolha sua ação."`
);

 document.getElementById("controls").innerHTML=`
<button class="manual" onclick="showTheory()">CONSULTAR MANUAL TÉCNICO</button>
<button onclick="choose(true)">${m.ok}</button>
<button onclick="choose(false)">${m.bad}</button>
`;

 updateHUD();

}

function showTheory(){

 let m=missions[fase];

 document.getElementById("display").innerHTML += `

-----------------------

${m.theory}`;

}

function choose(ok){

 let m=missions[fase];

 if(ok){
  gold+=120;
  score[m.axis]+=2;
  typeText(m.feedbackOk);
 }else{
  hp-=10;
  gold-=80;
  typeText(m.feedbackBad);
 }

 fase++;

 setTimeout(render,1800);

}

function finalScreen(){

 let total=
 score.documentacao+
 score.tempo+
 score.sustentabilidade+
 score.qualidade+
 score.colaboracao;

 let perc=Math.round((total/60)*100);

 let final="";

 if(perc>=90){
  final="A IA CENTRAL TRANSFERE O COMANDO TOTAL À HUMANIDADE.";
 }else if(perc>=70){
  final="COMANDO COMPARTILHADO ESTABELECIDO.";
 }else if(perc>=50){
  final="A IA ASSUME SETORES CRÍTICOS.";
 }else{
  final="PROTOCOLO HUMANO ENCERRADO.";
 }

 typeText(
`RELATÓRIO FINAL

Documentação: ${score.documentacao}
Tempo: ${score.tempo}
Sustentabilidade: ${score.sustentabilidade}
Qualidade: ${score.qualidade}
Colaboração: ${score.colaboracao}

TOTAL: ${total}/60
DESEMPENHO: ${perc}%

${final}`
 );

 document.getElementById("controls").innerHTML=`
<button onclick="restart()">REINICIAR MISSÃO</button>
`;

}

function restart(){

 hp=100;
 gold=5000;
 fase=0;

 score={
  documentacao:0,
  tempo:0,
  sustentabilidade:0,
  qualidade:0,
  colaboracao:0
 };

 render();

}

render();

</script>

</body>
</html>
