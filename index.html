<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega de Atividades</title>
    <style>
        :root { --primary: #2563eb; --secondary: #0f172a; --bg: #f1f5f9; --text: #1e293b; --success: #16a34a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 20px; }
        .header h1 { color: var(--secondary); margin: 0; font-size: 24px; }
        .header p { color: var(--primary); font-weight: bold; margin: 5px 0 0 0; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #cbd5e1; 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        textarea { min-height: 200px; resize: vertical; font-family: inherit; }
        
        button { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; 
            font-size: 18px; margin-top: 30px; transition: background 0.3s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #success-screen { display: none; text-align: center; padding: 40px; }
        .icon-success { color: var(--success); font-size: 60px; margin-bottom: 20px; }
        
        .footer-info { margin-top: 20px; font-size: 12px; color: #64748b; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="form-screen">
        <div class="header">
            <h1>Educação Profissinal Desenvolvimento de Sistemas</h1>
            <p>Portal de Entrega de Atividades</p>
        </div>

        <form id="entregaForm">
            <label for="escola">Escola</label>
            <select id="escola" required>
                <option value="">Selecione a unidade...</option>
                <option value="REGINATO">ANTONIO REGINATO</option>
                <option value="AMILCARE">AMILCARE MATTEI</option>
            </select>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo" required>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="ra">RA (Apenas números)</label>
                    <input type="text" id="ra" placeholder="Ex: 123456789" required>
                </div>
                <div style="flex: 1;">
                    <label for="serie">Série/Turma</label>
                    <input type="text" id="serie" placeholder="Ex: 2º B" required>
                </div>
            </div>

            <label for="disciplina">Disciplina</label>
            <select id="disciplina" required>
                <option value="">Selecione a matéria...</option>
                <option value="Produção Textual">Produção Textual</option>
                <option value="Redes">Redes de Computadores</option>
                <option value="Inteligencia Artificial">Inteligência Artificial</option>
                <option value="Backend">Desenvolvimento Backend</option>
                <option value="FrontEnd">Desenvolvimento Frontend</option>
            </select>

            <label for="conteudo">Atividade (Cole sua Redação ou Link do Projeto)</label>
            <textarea id="conteudo" placeholder="Cole aqui seu texto ou o link do seu repositório/projeto..." required></textarea>

            <button type="submit" id="btnEnviar">ENVIAR MINHA Redação</button>
        </form>
        <div class="footer-info">Sua atividade será enviada diretamente para o sistema de avaliação do Professor Rosa.</div>
    </div>

    <div id="success-screen">
        <div class="icon-success">✓</div>
        <h2>Atividade Enviada!</h2>
        <p id="msg-sucesso"></p>
        <button onclick="window.location.reload()" style="background: var(--secondary); margin-top: 20px;">Fazer outra entrega</button>
    </div>
</div>

<script>
    const form = document.getElementById('entregaForm');
    const btn = document.getElementById('btnEnviar');
    const formScreen = document.getElementById('form-screen');
    const successScreen = document.getElementById('success-screen');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Bloqueia o botão para evitar cliques duplos
        btn.disabled = true;
        btn.innerText = "Sincronizando com n8n...";

        const payload = {
            escola: document.getElementById('escola').value,
            nome: document.getElementById('nome').value,
            ra: document.getElementById('ra').value,
            serie: document.getElementById('serie').value,
            disciplina: document.getElementById('disciplina').value,
            conteudo: document.getElementById('conteudo').value,
            tipo_envio: "Formulario_Atividade_Geral",
            data_envio: new Date().toLocaleString('pt-BR'),
            key_alunos: "key_alunos" // Mantendo seu padrão de chave
        };

        try {
            const response = await fetch('https://n8n.inetz.com.br/webhook-test/avalia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                formScreen.style.display = 'none';
                successScreen.style.display = 'block';
                document.getElementById('msg-sucesso').innerText = 
                    `Parabéns, ${payload.nome}! Sua atividade de ${payload.disciplina} foi entregue com sucesso.`;
            } else {
                throw new Error();
            }
        } catch (error) {
            alert("Erro ao enviar para o n8n. Verifique sua conexão ou tente novamente.");
            btn.disabled = false;
            btn.innerText = "TENTAR REENVIAR AGORA";
        }
    });
</script>

</body>
</html>
