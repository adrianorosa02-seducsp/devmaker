<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Inetz - Versionamento</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --wrong: #dc2626; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #quiz-screen, #final-screen { display: none; }
        .login-box { text-align: center; padding: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 8px 0; padding: 12px; border: 2px solid #cbd5e1; border-radius: 6px; cursor: pointer; }
        .options li.selected { border-color: var(--primary); background: #eff6ff; }
        /* No erro, apenas a selecionada fica vermelha. A correta NÃO aparece. */
        .options li.wrong-reveal { background: #fee2e2; border-color: var(--wrong); color: var(--wrong); font-weight: bold; }
        .options li.correct-hide { background: #dcfce7; border-color: var(--success); color: var(--success); font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .verify-btn { background: #64748b; width: auto; margin-top: 10px; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #fff5f5; border-left: 5px solid var(--wrong); color: #991b1b; }
        .success-note { background: #f0fdf4; border-left: 5px solid var(--success); color: #166534; }
        .progresso-bar { font-weight: bold; color: var(--primary); margin-bottom: 20px; display: block; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="login-box">
        <h1>Avaliação: Versionamento de Código</h1>
        <p>Inetz - Sistema de Verificação de Aprendizagem</p>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="ra" placeholder="RA do Aluno">
        <button onclick="startQuiz()">Iniciar Atividade (30 Questões)</button>
    </div>

    <div id="quiz-screen">
        <span class="progresso-bar" id="progresso">Progresso: 0/30</span>
        <div id="questions-container"></div>
        <button id="final-submit-btn" disabled onclick="enviarTudo()" style="margin-top:20px; background:#0f172a;">FINALIZAR E ENVIAR AO PROFESSOR</button>
    </div>

    <div id="final-screen" style="text-align: center;">
        <h2 id="final-msg">Enviando notas...</h2>
    </div>
</div>

<script>
    const questionsData = [
        // S1 - Fundamentos (1-10)
        { id: "q1", week: "S1", q: "O que é versionamento de código?", opts: ["Salvar arquivos com nomes diferentes", "Sistema que registra mudanças em arquivos ao longo do tempo", "Um tipo de compilador"], correct: 1 },
        { id: "q2", week: "S1", q: "Qual o benefício de ter um histórico de alterações?", opts: ["Aumentar o tamanho do projeto", "Poder reverter para estados anteriores em caso de erro", "Esconder falhas do programador"], correct: 1 },
        { id: "q3", week: "S1", q: "Definição de Repositório no contexto Git:", opts: ["Local de armazenamento de códigos e seu histórico", "Pasta de downloads do computador", "Um servidor de e-mail"], correct: 0 },
        { id: "q4", week: "S1", q: "O que o rastreamento de modificações permite identificar?", opts: ["O preço do hardware", "Quem alterou, o que foi alterado e quando", "A velocidade da internet"], correct: 1 },
        { id: "q5", week: "S1", q: "No versionamento, o termo 'Snapshot' refere-se a:", opts: ["Uma foto da tela do computador", "Um registro do estado dos arquivos em um momento específico", "Um tipo de vírus"], correct: 1 },
        { id: "q6", week: "S1", q: "Por que o versionamento é crucial para equipes?", opts: ["Para impedir que outros vejam o código", "Para gerenciar conflitos quando dois editam o mesmo arquivo", "Para obrigar todos a usarem o mesmo teclado"], correct: 1 },
        { id: "q7", week: "S1", q: "O que acontece ao 'reverter' um arquivo no Git?", opts: ["O arquivo é excluído permanentemente", "O conteúdo volta a uma versão salva anteriormente", "O sistema operacional reinicia"], correct: 1 },
        { id: "q8", week: "S1", q: "Qual o papel do 'Autor' em um commit?", opts: ["Vender o software", "Identificar quem foi o responsável pela mudança", "Testar o código"], correct: 1 },
        { id: "q9", week: "S1", q: "Git é considerado um sistema:", opts: ["Centralizado", "Distribuído", "Manual"], correct: 1 },
        { id: "q10", week: "S1", q: "O versionamento substitui o backup manual?", opts: ["Sim, e é muito mais eficiente por guardar o histórico", "Não, são coisas opostas", "Apenas se o computador for da Apple"], correct: 0 },

        // S2 - Ferramentas (11-20)
        { id: "q11", week: "S2", q: "Diferença fundamental entre Git e GitHub:", opts: ["Nenhuma", "Git é a ferramenta local; GitHub é a plataforma de hospedagem", "GitHub é o motor; Git é a rede social"], correct: 1 },
        { id: "q12", week: "S2", q: "Qual plataforma é famosa por hospedar a maioria dos projetos Open Source?", opts: ["Bitbucket", "GitLab", "GitHub"], correct: 2 },
        { id: "q13", week: "S2", q: "Uma característica forte do GitLab é:", opts: ["Não ter interface web", "Ferramentas integradas de CI/CD (integração contínua)", "Ser exclusivo para Windows"], correct: 1 },
        { id: "q14", week: "S2", q: "No Bitbucket, qual o limite de usuários no plano gratuito?", opts: ["Ilimitado", "Até 5 usuários", "Até 50 usuários"], correct: 1 },
        { id: "q15", week: "S2", q: "O que é um Repositório Privado?", opts: ["Um repositório que ninguém pode ver", "Acesso restrito apenas a pessoas autorizadas", "Um repositório que custa 1 milhão de reais"], correct: 1 },
        { id: "q16", week: "S2", q: "Qual ferramenta é da empresa Atlassian?", opts: ["GitHub", "Bitbucket", "GitLab"], correct: 1 },
        { id: "q17", week: "S2", q: "O que é Code Review?", opts: ["Digitar o código mais rápido", "Revisão do código por outros desenvolvedores", "Formatação de texto"], correct: 1 },
        { id: "q18", week: "S2", q: "O plano 'Sponsors' é uma funcionalidade de qual plataforma?", opts: ["GitLab", "GitHub", "Bitbucket"], correct: 1 },
        { id: "q19", week: "S2", q: "Onde é mais comum encontrar repositórios corporativos integrados ao Jira?", opts: ["GitHub", "Bitbucket", "SourceForge"], correct: 1 },
        { id: "q20", week: "S2", q: "Qual o perigo de um repositório Público?", opts: ["O código rodar mais devagar", "Exposição de dados sensíveis ou senhas", "Aumento do tráfego de rede"], correct: 1 },

        // S3 - GitHub Web (21-30)
        { id: "q21", week: "S3", q: "Qual arquivo descreve o projeto no GitHub?", opts: ["CONFIG.sys", "README.md", "INDEX.php"], correct: 1 },
        { id: "q22", week: "S3", q: "O comando 'Commit changes' via interface web serve para:", opts: ["Apagar o projeto", "Salvar as alterações no histórico", "Baixar os arquivos"], correct: 1 },
        { id: "q23", week: "S3", q: "Como identificar a ramificação principal de um projeto?", opts: ["Pelo nome 'Secondary'", "Pelo nome 'main' ou 'master'", "Pelo nome 'Draft'"], correct: 1 },
        { id: "q24", week: "S3", q: "Para desfazer um commit de forma segura no GitHub, clicamos em:", opts: ["Delete commit", "Revert", "Format"], correct: 1 },
        { id: "q25", week: "S3", q: "Mensagens de commit como 'feat: algo' indicam:", opts: ["Correção de bug", "Nova funcionalidade", "Documentação"], correct: 1 },
        { id: "q26", week: "S3", q: "Onde vemos a lista cronológica de alterações no GitHub?", opts: ["Aba Issues", "Link de Commits", "Aba Pull Requests"], correct: 1 },
        { id: "q27", week: "S3", q: "O que o botão 'Edit' (lápis) permite fazer no GitHub Web?", opts: ["Mudar a senha do usuário", "Editar o conteúdo do arquivo diretamente no navegador", "Deletar o repositório"], correct: 1 },
        { id: "q28", week: "S3", q: "Uma boa mensagem de commit deve ser:", opts: ["Longa e técnica", "Curta e descrever o que mudou", "Apenas a data"], correct: 1 },
        { id: "q29", week: "S3", q: "O que é o 'Initial Commit'?", opts: ["O erro inicial", "O primeiro registro de criação do projeto", "O commit final"], correct: 1 },
        { id: "q30", week: "S3", q: "Ao reverter um commit, o Git:", opts: ["Apaga o histórico anterior", "Cria um novo commit desfazendo a ação e mantendo o rastro", "Trava o repositório"], correct: 1 }
    ];

    let userState = { nome: "", ra: "", acertos: 0, respostas_aluno: {} };
    let respondidasCount = 0;

    function startQuiz() {
        userState.nome = document.getElementById('nome').value;
        userState.ra = document.getElementById('ra').value;
        if(!userState.nome || !userState.ra) return alert("Preencha Nome e RA para continuar.");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        const container = document.getElementById('questions-container');
        questionsData.forEach((item, index) => {
            container.innerHTML += `
                <div class="question" id="${item.id}" data-correct="${item.correct}">
                    <p><strong>${index+1}. ${item.q}</strong></p>
                    <ul class="options">
                        ${item.opts.map((o, i) => `<li onclick="sel(this, ${i})">${o}</li>`).join('')}
                    </ul>
                    <button class="verify-btn" onclick="check('${item.id}', '${item.week}')">Verificar</button>
                    <div class="explanation" id="exp-${item.id}"></div>
                </div>`;
        });
    }

    function sel(el, idx) {
        if(el.parentElement.dataset.locked) return;
        Array.from(el.parentElement.children).forEach(li => li.classList.remove('selected'));
        el.classList.add('selected');
    }

    function check(id, week) {
        const qDiv = document.getElementById(id);
        if(qDiv.dataset.locked) return;

        const selectedEl = qDiv.querySelector('.selected');
        if(!selectedEl) return alert("Selecione uma resposta antes de verificar.");

        const marcadas = Array.from(qDiv.querySelectorAll('li')).indexOf(selectedEl);
        const correctIdx = parseInt(qDiv.dataset.correct);
        const isCorrect = (marcadas === correctIdx);

        userState.respostas_aluno[id] = marcadas;
        qDiv.dataset.locked = "true";
        qDiv.querySelector('.verify-btn').disabled = true;

        const expDiv = document.getElementById(`exp-${id}`);
        expDiv.style.display = 'block';

        if(isCorrect) {
            userState.acertos++;
            selectedEl.classList.add('correct-hide');
            expDiv.className = "explanation success-note";
            expDiv.innerHTML = "✅ <strong>Resposta Correta!</strong>";
        } else {
            selectedEl.classList.add('wrong-reveal');
            // IMPORTANTE: NÃO mostramos a correta. Forçamos a leitura.
            expDiv.innerHTML = `❌ <strong>RESPOSTA INCORRETA.</strong><br>Para entender este conceito, você deve <strong>consultar obrigatoriamente o material da SEMANA ${week.replace('S','')}</strong>.`;
        }

        respondidasCount++;
        document.getElementById('progresso').innerText = `Progresso: ${respondidasCount}/30`;
        if(respondidasCount === 30) document.getElementById('final-submit-btn').disabled = false;
    }

    async function enviarTudo() {
        const btn = document.getElementById('final-submit-btn');
        btn.disabled = true;
        btn.innerText = "Sincronizando com n8n...";

        const payload = { ...userState, key_alunos: "key_alunos", modulo: "Versionamento_30Q", timestamp: new Date().toISOString() };

        try {
            await fetch('https://n8n.inetz.com.br/webhook-test/avalia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('final-msg').innerHTML = `Avaliação Finalizada!<br>Você atingiu ${userState.acertos} pontos de 30 possíveis.`;
        } catch (e) {
            alert("Erro de conexão. Tente novamente.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
